<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <defs>
    <radialGradient id="gD" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9B5DE5" stop-opacity="0.7"/>
    </radialGradient>
  </defs>
  <!-- 8 outer petals -->
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.75" transform="rotate(0   20 20)"/>
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.6"  transform="rotate(45  20 20)"/>
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.75" transform="rotate(90  20 20)"/>
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.6"  transform="rotate(135 20 20)"/>
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.75" transform="rotate(180 20 20)"/>
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.6"  transform="rotate(225 20 20)"/>
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.75" transform="rotate(270 20 20)"/>
  <ellipse cx="20" cy="7"  rx="3" ry="5" fill="#C084FC" opacity="0.6"  transform="rotate(315 20 20)"/>
  <!-- Inner ring of 8 smaller petals -->
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(22.5  20 20)"/>
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(67.5  20 20)"/>
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(112.5 20 20)"/>
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(157.5 20 20)"/>
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(202.5 20 20)"/>
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(247.5 20 20)"/>
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(292.5 20 20)"/>
  <ellipse cx="20" cy="12" rx="2" ry="3.5" fill="#D8B4FE" opacity="0.5" transform="rotate(337.5 20 20)"/>
