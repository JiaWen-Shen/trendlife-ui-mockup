// ── Ambient Lifestream Sound Engine ──
function useAmbientSound(isPlaying) {
  const synthRef = useRef(null);
  const seqRef = useRef(null);
  const initRef = useRef(false);

  useEffect(() => {
    if (!isPlaying) {
      if (seqRef.current) { seqRef.current.stop(); seqRef.current.dispose(); seqRef.current = null; }
      if (synthRef.current) { synthRef.current.dispose(); synthRef.current = null; }
      initRef.current = false;
      return;
    }

    const startAudio = async () => {
      if (initRef.current) return;
      initRef.current = true;
      await Tone.start();

      // Ethereal reverb space
      const reverb = new Tone.Reverb({ decay: 8, wet: 0.7 }).toDestination();
      const delay = new Tone.FeedbackDelay({ delayTime: "8n.", feedback: 0.3, wet: 0.25 }).connect(reverb);
      const chorus = new Tone.Chorus({ frequency: 0.3, delayTime: 3.5, depth: 0.6, wet: 0.3 }).connect(delay);

      // Crystalline harp-like synth
      const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 0.15, decay: 2.5, sustain: 0.1, release: 4 },
        volume: -18,
      }).connect(chorus);

      // Soft pad underneath
      const pad = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 3, decay: 4, sustain: 0.4, release: 6 },
        volume: -26,
      }).connect(reverb);

      synthRef.current = { synth, pad, reverb, delay, chorus };

      // Pentatonic-ish notes across octaves — ethereal, no dissonance
      const notes = [
        "C4","E4","G4","B4","C5","E5","G5","B5",
        "D4","F#4","A4","D5","F#5","A5",
        "C4","G4","E5","B5","G5","C6",
        "A3","E4","C5","G5","E5","A5",
      ];

      // Pad chord changes - warmer voicings with minor color
      const padChords = [
        ["C3","G3","E4"], ["A2","E3","C4"], ["D3","A3","F#4"], ["G3","D4","B4"],
        ["F3","C4","A4"], ["E3","B3","G#4"],
      ];

      let noteIdx = 0;
      let padIdx = 0;
      let stepCount = 0;

      // Arpeggiated sequence — gentle, unhurried
      const seq = new Tone.Loop((time) => {
        // Pick note with slight randomness for organic feel
        const idx = (noteIdx + (Math.random() < 0.15 ? Math.floor(Math.random() * 3) : 0)) % notes.length;
        const note = notes[idx];
        const velocity = 0.15 + Math.random() * 0.15;
        synth.triggerAttackRelease(note, "2n", time, velocity);
        noteIdx = (noteIdx + 1) % notes.length;
        stepCount++;

        // Pad changes every 8 notes
        if (stepCount % 8 === 0) {
          pad.triggerAttackRelease(padChords[padIdx % padChords.length], "2m", time, 0.12);
          padIdx++;
        }
      }, "4n");

      Tone.getTransport().bpm.value = 52;
      Tone.getTransport().start();
      seq.start(0);
      seqRef.current = seq;
    };

    startAudio();

    return () => {
      if (seqRef.current) { seqRef.current.stop(); seqRef.current.dispose(); seqRef.current = null; }
      if (synthRef.current) {
        Object.values(synthRef.current).forEach(n => { try { n.dispose(); } catch {} });
        synthRef.current = null;
      }
      initRef.current = false;
      Tone.getTransport().stop();
    };
  }, [isPlaying]);
}

// ── Particle system ──
function useParticles(canvasRef, w, h) {
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = w; canvas.height = h;
    const particles = Array.from({ length: 80 }, () => {
      const colorType = Math.random();
      let hue;
      if (colorType < 0.3) hue = 30 + Math.random() * 20; // amber/gold (dominant)
      else if (colorType < 0.5) hue = 15 + Math.random() * 15; // coral/warm
      else if (colorType < 0.65) hue = 140 + Math.random() * 30; // FF7 green (accent)
      else if (colorType < 0.8) hue = 340 + Math.random() * 20; // rose/pink
      else hue = 45 + Math.random() * 15; // cream/warm yellow
      return {
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.15 - 0.1,
        size: Math.random() * 2.5 + 0.5, alpha: Math.random() * 0.35 + 0.08,
        hue,
      };
    });
    let animId;
    const draw = () => {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
        p.alpha += (Math.random() - 0.5) * 0.02;
        p.alpha = Math.max(0.05, Math.min(0.5, p.alpha));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${p.alpha})`;
        ctx.fill();
        // Glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${p.alpha * 0.15})`;
        ctx.fill();
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(animId);
  }, [w, h]);
}

                {connectedEdges.length > 0 && (
                  <>
                    <div style={{ fontSize: "8px", color: "#DCB97866", letterSpacing: 2, marginBottom: 8 }}>CONNECTIONS ({connectedEdges.length})</div>

                      const otherId = e.source === selectedNode.id ? e.target : e.source;
                      const other = allNodes.find(n => n.id === otherId);

                        <div key={i} style={{ padding: "6px 0", borderBottom: "1px solid #FFC3640a" }}>

            )}
            {selectedNode && !selectedChar && (
              <>
                <div style={{ fontSize: "13px", color: selectedNode.color || "#FFC364", fontWeight: 600, marginBottom: 4 }}>{selectedNode.label}</div>

                {selectedNode.date && <div style={{ fontSize: "9px", color: "#DCB97844", marginBottom: 8 }}>{selectedNode.date}</div>}
                <div style={{ fontSize: "11px", lineHeight: 1.7, color: "#FFEBD299" }}>{selectedNode.desc}</div>
                {connectedEdges.length > 0 && (
                  <div style={{ marginTop: 12 }}>
                    <div style={{ fontSize: "8px", color: "#DCB97866", letterSpacing: 2, marginBottom: 8 }}>CONNECTIONS</div>
                    {connectedEdges.map((e, i) => {
                      const otherId = e.source === selectedNode.id ? e.target : e.source;
                      const other = allNodes.find(n => n.id === otherId);
                      return (<div key={i} style={{ padding: "4px 0", borderBottom: "1px solid #FFC3640a", fontSize: "10px", color: "#FFC36488" }}>
                        <span style={{ color: other?.color, cursor: "pointer" }} onClick={() => { setSelectedNode(other); setHighlightedNodes(new Set([other?.id])); }}>{other?.label}</span>
                        <span style={{ color: "#DCB97844" }}> — </span>{e.label}
                      </div>);
                    })}
                  </div>
                )}
              </>
            )}
            {selectedEdge && (() => {
              const sNode = allNodes.find(n => n.id === (typeof selectedEdge.source === "object" ? selectedEdge.source.id : selectedEdge.source));
              const tNode = allNodes.find(n => n.id === (typeof selectedEdge.target === "object" ? selectedEdge.target.id : selectedEdge.target));
              return (<>
                <div style={{ fontSize: "12px", color: "#FFC364cc", marginBottom: 8 }}>
                  <span style={{ color: sNode?.color, cursor: "pointer" }} onClick={() => { setSelectedNode(sNode); setHighlightedNodes(new Set([sNode?.id])); }}>{sNode?.label}</span>
                  <span style={{ color: "#DCB97844" }}> → </span>
                  <span style={{ color: tNode?.color, cursor: "pointer" }} onClick={() => { setSelectedNode(tNode); setHighlightedNodes(new Set([tNode?.id])); }}>{tNode?.label}</span>
                </div>
                <div style={{ fontSize: "8px", color: "#FFC36477", letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>{selectedEdge.type}</div>
                <div style={{ fontSize: "9px", color: "#DCB97844", marginBottom: 10 }}>{selectedEdge.date}</div>
                <div style={{ fontSize: "11px", lineHeight: 1.7, color: "#FFEBD299", fontStyle: "italic", padding: 10, background: "#FFC36408", borderRadius: 6, borderLeft: `2px solid ${sNode?.color || "#FFC364"}` }}>{selectedEdge.label}</div>
                <div style={{ fontSize: "10px", color: "#DCB97866", marginTop: 8 }}>{EDGE_TYPES[selectedEdge.type]?.meaning}</div>
              </>);
            })()}
          </div>
        )}

        {/* ── Panels ── */}

        {activePanel === "legend" && (
          <div style={panelStyle}>
            <div style={{ padding: "12px 16px", borderBottom: "1px solid #FFC36415", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: "8px", color: "#FFC364aa", letterSpacing: 3 }}>EDGE TYPES</span>
              <button onClick={() => setActivePanel(null)} style={{ background: "none", border: "none", color: "#DCB97866", cursor: "pointer", fontSize: "14px" }}>✕</button>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: 12 }}>
              {[
                { title: "Convergent / Resonant", color: "#C41E3A", dash: true, types: ["converges", "mirrors"] },
                { title: "Silent Influence", color: "#FFC364", dash: true, opacity: 0.3, types: ["absorbed", "observed", "inspired", "adopted"] },
                { title: "Infrastructure / Recognition", color: "#FFC364", dash: false, opacity: 0.6, types: ["enabled", "validated"] },
                { title: "Direct / Explicit", color: "#DCB978", dash: false, types: ["created", "influenced", "referenced", "credited", "sent", "initiated"] },
                { title: "Structural Intervention", color: "#B0BEC5", dash: true, types: ["facilitated", "diagnosed"] },
                { title: "Foundation", color: "#FFB84D", dash: false, opacity: 0.4, types: ["shaped", "showed", "foundation", "originated"] },
              ].map((cat, ci) => (
                <div key={ci} style={{ marginBottom: 14, padding: 12, background: "#FFC36406", borderRadius: 8, border: "1px solid #FFC36412" }}>

                    <svg width="40" height="8">
                      <line x1="0" y1="4" x2="40" y2="4"
                        stroke={cat.color} strokeWidth="2"
                        strokeOpacity={cat.opacity || 0.5}
                        strokeDasharray={cat.dash ? "5,4" : "none"} />
                    </svg>
                    <span style={{ fontSize: "10px", color: "#FFC364cc", fontWeight: 600, letterSpacing: 1 }}>{cat.title}</span>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {cat.types.map(t => (
                      <div key={t} style={{ padding: "3px 8px", background: "#FFC36408", borderRadius: 4, border: "1px solid #FFC3640a" }}>
                        <div style={{ fontSize: "9px", color: "#FFC36488", fontWeight: 500 }}>{t}</div>
                        <div style={{ fontSize: "8px", color: "#DCB97855", marginTop: 1 }}>{EDGE_TYPES[t]?.meaning}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}

              <div style={{ marginTop: 8, padding: 12, background: "#FFC36406", borderRadius: 8, border: "1px solid #FFC36412" }}>
                <div style={{ fontSize: "9px", color: "#FFC36466", letterSpacing: 1, marginBottom: 6 }}>READING THE GRAPH</div>
                <div style={{ fontSize: "10px", color: "#DCB97866", lineHeight: 1.8 }}>
                  <div>Dashed lines = indirect, silent, or unconscious influence</div>
                  <div>Solid lines = direct, explicit, acknowledged</div>
                  <div>Red/coral edges = convergence (most interesting — independent arrival)</div>
                  <div>Faint edges = invisible influence (the thesis)</div>
                  <div>Bright edges = infrastructure nobody credits</div>
                </div>
              </div>
            </div>
          </div>
        )}

        {activePanel === "insights" && graphData.insights?.length > 0 && (
          <div style={panelStyle}>
            <div style={{ padding: "12px 16px", borderBottom: "1px solid #FFC36415", display: "flex", justifyContent: "space-between", alignItems: "center" }}>

              <button onClick={() => setActivePanel(null)} style={{ background: "none", border: "none", color: "#DCB97866", cursor: "pointer", fontSize: "14px" }}>✕</button>

            <div style={{ flex: 1, overflowY: "auto", padding: 12 }}>
              {graphData.insights.map((ins, i) => {

                  <div key={i} style={{ padding: 14, background: "#FFC36406", borderRadius: 8, marginBottom: 10, border: "1px solid #FFC36412", borderLeft: `3px solid ${ch.color}44` }}>

          </div>

        {activePanel === "chat" && (
          <div style={panelStyle}>
            <div style={{ padding: "12px 16px", borderBottom: "1px solid #FFC36415", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: "8px", color: "#FFC36477", letterSpacing: 3 }}>TALK TO THE KALEIDOSCOPE</span>

            <div style={{ flex: 1, overflowY: "auto", padding: 12, display: "flex", flexDirection: "column", gap: 10 }}>
              {chatMessages.map((msg, i) => (
                <div key={i} style={{
                  alignSelf: msg.role === "user" ? "flex-end" : "flex-start", maxWidth: "92%",
                  background: msg.role === "user" ? "#FFC3640a" : "#FFC36406",
                  borderRadius: msg.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px",
                  padding: "10px 14px", border: `1px solid ${msg.role === "user" ? "#FFC36422" : "#FFC36412"}`,
                }}>
                  <div style={{ fontSize: "11px", lineHeight: 1.7, color: msg.role === "user" ? "#FFC364cc" : "#FFEBD299", whiteSpace: "pre-wrap" }}>
                    {msg.role === "assistant" ? renderChat(msg.content) : msg.content}
                  </div>
                </div>
              ))}
              {isLoading && <div style={{ fontSize: "11px", color: "#EB8C78aa", fontStyle: "italic" }}>the kaleidoscope turns...</div>}
              <div ref={chatEndRef} />
            </div>
            <div style={{ padding: 12, borderTop: "1px solid #FFC36415" }}>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendChat()}
                  placeholder="Ask the Kaleidoscope..."
                  style={{ flex: 1, background: "#0a0908", border: "1px solid #FFC36418", borderRadius: 6, padding: "8px 12px", color: "#FFC364cc", fontSize: "11px", fontFamily: "inherit", outline: "none" }} />
                <button onClick={sendChat} disabled={isLoading}
                  style={{ background: "#FFC3640a", border: "1px solid #FFC36422", borderRadius: 6, padding: "8px 14px", color: "#FFC36488", fontSize: "10px", cursor: "pointer", fontFamily: "inherit" }}>↵</button>
              </div>
              <div style={{ display: "flex", gap: 5, marginTop: 8, flexWrap: "wrap" }}>
                {["Who started this?", "Mei ↔ Sofia?", "Remove Ray?", "Hiro's role?", "Attribution gap?"].map(q => (
                  <button key={q} onClick={() => setChatInput(q)}
                    style={{ background: "transparent", border: "1px solid #FFC36412", borderRadius: 4, padding: "3px 7px", color: "#DCB97866", fontSize: "8px", cursor: "pointer", fontFamily: "inherit" }}>{q}</button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const SPRITE_COLORS = {
  'C': '#FFEBD2', // head/skin (warm cream)
  'S': '#8B5E3C', // shirt (warm brown)
  'B': '#3D2B1F', // boots (dark brown)
  '.': '#FFC36433', // shadow/outline
};

function drawSprite(ctx, x, y, direction, frame, scale) {
  const frames = SPRITE_FRAMES[direction] || SPRITE_FRAMES.down;
  const data = frames[frame % frames.length];
  const ps = scale; // pixel size

  data.forEach((row, ry) => {
    for (let rx = 0; rx < row.length; rx++) {
      const ch = row[rx];
      if (ch !== ' ') {
        const color = SPRITE_COLORS[ch] || '#FFC36444';
        ctx.fillStyle = color;
        ctx.fillRect(
          Math.floor(x - (row.length * ps) / 2 + rx * ps),
          Math.floor(y - data.length * ps + ry * ps),
          Math.ceil(ps), Math.ceil(ps)
        );
      }
    }
  });
}

// ═══════════════════════════════════════════════
// WORLD RENDERER
// ═══════════════════════════════════════════════

function drawFlowers(ctx, x, y, count, seed) {
  const rng = (s) => { s = Math.sin(s) * 43758.5453; return s - Math.floor(s); };
  const colors = ['#FFC364', '#EB8C78', '#FF6B5A', '#FFEBD2', '#78BE82'];
  for (let i = 0; i < count; i++) {
    const fx = x + rng(seed + i * 7) * 80 - 40;
    const fy = y + rng(seed + i * 13) * 60 - 30;
    const c = colors[Math.floor(rng(seed + i * 3) * colors.length)];
    const s = 2 + rng(seed + i * 11) * 3;
    // Stem
    ctx.fillStyle = '#78BE8244';
    ctx.fillRect(fx, fy, 1, s * 2);
    // Petals
    ctx.fillStyle = c + '88';
    ctx.beginPath();
    ctx.arc(fx, fy, s, 0, Math.PI * 2);
    ctx.fill();
    // Center
    ctx.fillStyle = '#FFC36488';
    ctx.beginPath();
    ctx.arc(fx, fy, s * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawZone(ctx, zone, camX, camY) {
  const x = zone.x - camX;
  const y = zone.y - camY;
  const { w, h } = zone;

  // Floor
  ctx.fillStyle = zone.floorColor;
  ctx.fillRect(x, y, w, h);

  // Floor texture (subtle grid)
  ctx.strokeStyle = zone.color + '08';
  ctx.lineWidth = 0.5;
  for (let gx = 0; gx < w; gx += 24) {
    ctx.beginPath(); ctx.moveTo(x + gx, y); ctx.lineTo(x + gx, y + h); ctx.stroke();
  }
  for (let gy = 0; gy < h; gy += 24) {
    ctx.beginPath(); ctx.moveTo(x, y + gy); ctx.lineTo(x + w, y + gy); ctx.stroke();
  }

  // Walls (3-sided — open at bottom for entry)
  ctx.fillStyle = zone.wallColor;
  ctx.fillRect(x, y, w, 8); // top wall
  ctx.fillRect(x, y, 8, h); // left wall
  ctx.fillRect(x + w - 8, y, 8, h); // right wall

  // Wall accent line
  ctx.strokeStyle = zone.color + '44';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 8);
  ctx.lineTo(x + w - 8, y + 8);
  ctx.stroke();

  // Church gets flowers and broken roof light
  if (zone.id === "church") {
    drawFlowers(ctx, x + w / 2 - 30, y + h / 2, 12, 42);
    drawFlowers(ctx, x + w / 2 + 40, y + h / 2 + 20, 8, 77);
    drawFlowers(ctx, x + w / 2, y + h / 2 - 40, 6, 13);

    // Light beam from broken roof
    ctx.save();
    ctx.globalAlpha = 0.06;
    const grd = ctx.createRadialGradient(x + w/2, y + 20, 10, x + w/2, y + h/2, w/2);
    grd.addColorStop(0, '#FFC364');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(x + w/2 - 60, y);
    ctx.lineTo(x + w/2 + 60, y);
    ctx.lineTo(x + w/2 + 120, y + h);
    ctx.lineTo(x + w/2 - 120, y + h);
    ctx.fill();
    ctx.restore();
  }

  // Zone label
  ctx.fillStyle = zone.color + '55';
  ctx.font = "bold 11px 'JetBrains Mono', monospace";
  ctx.textAlign = "center";
  ctx.fillText(zone.label.toUpperCase(), x + w / 2, y + 28);

  // Character icon for apartments
  if (zone.id !== "church" && CHARACTERS[zone.id]) {
    const ch = CHARACTERS[zone.id];
    ctx.fillStyle = ch.color + '22';
    ctx.beginPath();
    ctx.arc(x + w / 2, y + h / 2, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = ch.color + '44';
    ctx.font = "24px serif";
    ctx.textAlign = "center";
    ctx.fillText(ch.icon, x + w / 2, y + h / 2 + 8);
  }
}

function drawArtifact(ctx, art, camX, camY, isNear, isActive) {
  const x = art.x - camX;
  const y = art.y - camY;
  const baseAlpha = isNear ? 'cc' : '55';
  const glowAlpha = isActive ? 'aa' : isNear ? '44' : '11';

  // Glow
  if (isNear || isActive) {
    ctx.save();
    const grd = ctx.createRadialGradient(x, y, 2, x, y, isActive ? 35 : 25);
    grd.addColorStop(0, art.color + glowAlpha);
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(x, y, isActive ? 35 : 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Icon
  ctx.fillStyle = art.color + baseAlpha;
  ctx.font = isNear ? "18px serif" : "14px serif";
  ctx.textAlign = "center";
  ctx.fillText(art.icon, x, y + 5);

  // Label (only when near)
  if (isNear) {
    ctx.fillStyle = art.color + '99';
    ctx.font = "9px 'JetBrains Mono', monospace";
    ctx.fillText(art.label, x, y + 22);

    if (!isActive) {
      ctx.fillStyle = '#FFC36444';
      ctx.font = "8px 'JetBrains Mono', monospace";
      ctx.fillText("[E] interact", x, y + 34);
    }
  }
}

function drawPath(ctx, fromZone, toZone, camX, camY, label) {
  const fx = fromZone.x + fromZone.w / 2 - camX;
  const fy = fromZone.y + fromZone.h - camY;
  const tx = toZone.x + toZone.w / 2 - camX;
  const ty = toZone.y - camY;

  ctx.save();
  ctx.strokeStyle = '#FFC36412';
  ctx.lineWidth = 18;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(fx, fy);
  ctx.quadraticCurveTo((fx + tx) / 2, (fy + ty) / 2, tx, ty);
  ctx.stroke();

  // Path stones
  ctx.fillStyle = '#FFC36408';
  const steps = 8;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const px = fx + (tx - fx) * t;
    const py = fy + (ty - fy) * t;
    ctx.beginPath();
    ctx.arc(px, py, 4 + Math.sin(t * Math.PI) * 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGround(ctx, camX, camY, viewW, viewH) {
  // Dark ground fill in world space
  ctx.fillStyle = '#0a0908';
  ctx.fillRect(camX - 10, camY - 10, viewW + 20, viewH + 20);

  // Grass tufts in world space
  ctx.fillStyle = '#78BE8208';
  const startX = Math.floor(camX / 40) * 40;
  const startY = Math.floor(camY / 40) * 40;
  for (let gx = startX - 40; gx < camX + viewW + 80; gx += 40) {
    for (let gy = startY - 40; gy < camY + viewH + 80; gy += 40) {
      const hash = Math.sin(gx * 12.9898 + gy * 78.233) * 43758.5453;
      const frac = hash - Math.floor(hash);
      if (frac > 0.7) {
        ctx.fillRect(gx + frac * 20, gy + ((hash * 7) % 20), 2, 4);
        ctx.fillRect(gx + frac * 20 + 3, gy + ((hash * 7) % 20) + 1, 2, 3);
      }
    }
  }
}

// ═══════════════════════════════════════════════
// MAIN COMPONENT
// ═══════════════════════════════════════════════

function WorldView() {
  const canvasRef = useRef(null);
  const [playerPos, setPlayerPos] = useState({ x: 1600, y: 1600 });
  const [playerDir, setPlayerDir] = useState("down");
  const [playerFrame, setPlayerFrame] = useState(0);
  const [activeArtifact, setActiveArtifact] = useState(null);
  const [currentZone, setCurrentZone] = useState(null);
  const [nearArtifacts, setNearArtifacts] = useState([]);
  const keysRef = useRef(new Set());
  const playerRef = useRef({ x: 1600, y: 1600 });
  const frameRef = useRef(0);
  const walkTimerRef = useRef(0);
  const [dims, setDims] = useState({ w: 800, h: 600 });
  const containerRef = useRef(null);
  const zoomRef = useRef(0.8);
  const [zoomDisplay, setZoomDisplay] = useState(0.8);
  const MIN_ZOOM = 0.15;
  const MAX_ZOOM = 2.5;

  // Resize
  useEffect(() => {
    const resize = () => {
      if (containerRef.current) {
        const r = containerRef.current.getBoundingClientRect();
        setDims({ w: r.width, h: r.height });
      }
    };
    resize();
    window.addEventListener("resize", resize);
    return () => window.removeEventListener("resize", resize);
  }, []);

  // Wheel zoom
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onWheel = (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.08 : 0.08;
      zoomRef.current = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomRef.current + delta));
      setZoomDisplay(zoomRef.current);
    };
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, []);

  // Key handlers
  useEffect(() => {
    const down = (e) => {
      keysRef.current.add(e.key.toLowerCase());
      if (e.key.toLowerCase() === 'e' || e.key === ' ') {
        // Interact
        if (nearArtifacts.length > 0 && !activeArtifact) {
          setActiveArtifact(nearArtifacts[0]);
        } else if (activeArtifact) {
          setActiveArtifact(null);
        }
      }
      if (e.key === 'Escape') setActiveArtifact(null);
      // Zoom shortcuts
      if (e.key === '=' || e.key === '+') { zoomRef.current = Math.min(MAX_ZOOM, zoomRef.current + 0.15); setZoomDisplay(zoomRef.current); }
      if (e.key === '-' || e.key === '_') { zoomRef.current = Math.max(MIN_ZOOM, zoomRef.current - 0.15); setZoomDisplay(zoomRef.current); }
      // Prevent scroll
      if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) {
        e.preventDefault();
      }
    };
    const up = (e) => keysRef.current.delete(e.key.toLowerCase());
    window.addEventListener("keydown", down);
    window.addEventListener("keyup", up);
    return () => { window.removeEventListener("keydown", down); window.removeEventListener("keyup", up); };
  }, [nearArtifacts, activeArtifact]);

  // Game loop
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let animId;

    const loop = () => {
      const zoom = zoomRef.current;
      const speed = 3 / zoom; // move faster when zoomed out
      const keys = keysRef.current;
      let dx = 0, dy = 0;
      let moving = false;

      if (keys.has('w') || keys.has('arrowup')) { dy = -speed; moving = true; }
      if (keys.has('s') || keys.has('arrowdown')) { dy = speed; moving = true; }
      if (keys.has('a') || keys.has('arrowleft')) { dx = -speed; moving = true; }
      if (keys.has('d') || keys.has('arrowright')) { dx = speed; moving = true; }

      // Diagonal normalize
      if (dx && dy) { dx *= 0.707; dy *= 0.707; }

      // Direction
      if (dy < 0) setPlayerDir("up");
      else if (dy > 0) setPlayerDir("down");
      else if (dx < 0) setPlayerDir("left");
      else if (dx > 0) setPlayerDir("right");

      // Move
      const p = playerRef.current;
      p.x = Math.max(50, Math.min(WORLD_W - 50, p.x + dx));
      p.y = Math.max(50, Math.min(WORLD_H - 50, p.y + dy));

      // Walk animation
      if (moving) {
        walkTimerRef.current++;
        if (walkTimerRef.current % 12 === 0) {
          frameRef.current = (frameRef.current + 1) % 2;
          setPlayerFrame(frameRef.current);
        }
      } else {
        frameRef.current = 0;
        walkTimerRef.current = 0;
      }

      setPlayerPos({ x: p.x, y: p.y });

      // Camera (zoom-aware: viewport in world units)
      const viewW = dims.w / zoom;
      const viewH = dims.h / zoom;
      const camX = p.x - viewW / 2;
      const camY = p.y - viewH / 2;

      // Current zone detection
      let inZone = null;
      for (const z of ZONES) {
        if (p.x >= z.x && p.x <= z.x + z.w && p.y >= z.y && p.y <= z.y + z.h) {
          inZone = z;
          break;
        }
      }
      setCurrentZone(inZone);

      // Near artifacts (scale proximity with zoom so interaction still works zoomed out)
      const NEAR_DIST = 60 / Math.min(zoom, 1);
      const near = [];
      for (const z of ZONES) {
        for (const a of z.artifacts) {
          const dist = Math.sqrt((p.x - a.x) ** 2 + (p.y - a.y) ** 2);
          if (dist < NEAR_DIST) near.push(a);
        }
      }
      setNearArtifacts(near);

      // ── RENDER ──
      canvas.width = dims.w;
      canvas.height = dims.h;

      // Apply zoom transform
      ctx.save();
      ctx.scale(zoom, zoom);
      ctx.translate(-camX, -camY);

      // Ground (draw larger area when zoomed out)
      drawGround(ctx, camX, camY, viewW, viewH);

      // Paths
      const zoneMap = {};
      ZONES.forEach(z => zoneMap[z.id] = z);
      PATHS.forEach(path => {
        if (zoneMap[path.from] && zoneMap[path.to]) {
          drawPath(ctx, zoneMap[path.from], zoneMap[path.to], 0, 0, path.label);
        }
      });

      // Zones
      ZONES.forEach(z => drawZone(ctx, z, 0, 0));

      // Artifacts
      for (const z of ZONES) {
        for (const a of z.artifacts) {
          const dist = Math.sqrt((p.x - a.x) ** 2 + (p.y - a.y) ** 2);
          const isNear = dist < NEAR_DIST;
          const isActive = activeArtifact?.id === a.id;
          drawArtifact(ctx, a, 0, 0, isNear, isActive);
        }
      }

      // Player
      drawSprite(ctx, p.x, p.y, moving ? (dy < 0 ? "up" : dy > 0 ? "down" : dx < 0 ? "left" : "right") : "down", frameRef.current, SPRITE_SCALE);

      // Player shadow
      ctx.fillStyle = '#00000033';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y + 4, 10, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      animId = requestAnimationFrame(loop);
    };

    loop();
    return () => cancelAnimationFrame(animId);
  }, [dims, activeArtifact]);

  return (
    <div ref={containerRef} style={{
      width: "100vw", height: "100vh", background: "#0a0908", overflow: "hidden",
      fontFamily: "'JetBrains Mono', monospace", color: "#FFEBD2", position: "relative",
    }}>
      <canvas ref={canvasRef} style={{ display: "block", width: "100%", height: "100%" }} />

      {/* HUD — top left */}
      <div style={{ position: "absolute", top: 12, left: 16, display: "flex", alignItems: "center", gap: 10 }}>
        <svg width="28" height="28" viewBox="0 0 80 80">
          <defs><radialGradient id="mg" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#FFC364" stopOpacity="0.4" /><stop offset="100%" stopColor="#EB8C78" stopOpacity="0" /></radialGradient></defs>
          <circle cx="40" cy="40" r="38" fill="url(#mg)" />
          {[0,45,90,135,180,225,270,315].map((d,i) => <ellipse key={i} cx="40" cy="14" rx="4.5" ry="10" fill="#EB8C7855" transform={`rotate(${d} 40 40)`} />)}
          {[22.5,67.5,112.5,157.5,202.5,247.5,292.5,337.5].map((d,i) => <ellipse key={i} cx="40" cy="20" rx="3.5" ry="7" fill="#FFC36455" transform={`rotate(${d} 40 40)`} />)}
          <circle cx="40" cy="40" r="3" fill="#FFF5E6cc" />
        </svg>
        <div>
          <div style={{ fontSize: "13px", fontFamily: "'Crimson Pro', serif", color: "#FFC364bb", letterSpacing: 3 }}>Kaleidoscope</div>
          <div style={{ fontSize: "8px", color: "#FFC36444", letterSpacing: 1 }}>
            {currentZone ? currentZone.label : "— open world —"}
          </div>
        </div>
      </div>

      {/* Controls hint + zoom — bottom left */}
      <div style={{ position: "absolute", bottom: 12, left: 16, fontSize: "9px", color: "#FFC36433", lineHeight: 1.8 }}>
        <div>WASD / Arrows — walk</div>
        <div>E / Space — interact</div>
        <div>Scroll — zoom · ESC — close</div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6 }}>
          <button onClick={() => { zoomRef.current = Math.max(MIN_ZOOM, zoomRef.current - 0.15); setZoomDisplay(zoomRef.current); }}
            style={{ background: "#FFC36408", border: "1px solid #FFC36422", borderRadius: 4, color: "#FFC36477", width: 24, height: 24, cursor: "pointer", fontSize: "14px", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
          <span style={{ color: "#FFC36466", minWidth: 36, textAlign: "center" }}>{Math.round(zoomDisplay * 100)}%</span>
          <button onClick={() => { zoomRef.current = Math.min(MAX_ZOOM, zoomRef.current + 0.15); setZoomDisplay(zoomRef.current); }}
            style={{ background: "#FFC36408", border: "1px solid #FFC36422", borderRadius: 4, color: "#FFC36477", width: 24, height: 24, cursor: "pointer", fontSize: "14px", fontFamily: "inherit", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          <button onClick={() => { zoomRef.current = 0.35; setZoomDisplay(0.35); }}
            style={{ background: "#FFC36408", border: "1px solid #FFC36422", borderRadius: 4, color: "#FFC36455", padding: "2px 6px", cursor: "pointer", fontSize: "8px", fontFamily: "inherit", letterSpacing: 1 }}>FIT</button>
        </div>
      </div>

      {/* Minimap — bottom right */}
      <div style={{ position: "absolute", bottom: 12, right: 16 }}>
        <svg width="120" height="100" viewBox={`0 0 ${WORLD_W} ${WORLD_H}`} style={{ background: "#0a090866", border: "1px solid #FFC36418", borderRadius: 6 }}>
          {ZONES.map(z => (
            <rect key={z.id} x={z.x} y={z.y} width={z.w} height={z.h}
              fill={z.id === currentZone?.id ? z.color + '44' : z.color + '18'}
              stroke={z.color + '44'} strokeWidth="20" />
          ))}
          <circle cx={playerPos.x} cy={playerPos.y} r="40" fill="#FFEBD2" />
        </svg>
      </div>

      {/* Character badges — top right */}
      <div style={{ position: "absolute", top: 12, right: 16, display: "flex", gap: 6 }}>
        {Object.entries(CHARACTERS).map(([id, ch]) => (
          <div key={id} style={{
            padding: "3px 8px", borderRadius: 4,
            background: currentZone?.id === id ? ch.color + '22' : 'transparent',
            border: `1px solid ${currentZone?.id === id ? ch.color + '44' : ch.color + '18'}`,
            cursor: "pointer", display: "flex", alignItems: "center", gap: 4,
          }}
            onClick={() => {
              const z = ZONES.find(z => z.id === id);
              if (z) { playerRef.current = { x: z.x + z.w / 2, y: z.y + z.h - 30 }; }
            }}>
            <span style={{ fontSize: "10px" }}>{ch.icon}</span>
            <span style={{ fontSize: "8px", color: ch.color + 'aa' }}>{ch.label}</span>
          </div>
        ))}
      </div>

      {/* Active artifact detail panel */}
      {activeArtifact && (
        <div style={{
          position: "absolute", bottom: 20, left: "50%", transform: "translateX(-50%)",
          width: 500, maxWidth: "calc(100vw - 40px)",
          background: "#0c0a08ee", backdropFilter: "blur(12px)",
          border: `1px solid ${activeArtifact.color}33`,
          borderTop: `2px solid ${activeArtifact.color}55`,
          borderRadius: 12, padding: "16px 20px",
          boxShadow: `0 8px 32px rgba(0,0,0,0.6), 0 0 20px ${activeArtifact.color}11`,
        }}>
          <button onClick={() => setActiveArtifact(null)}
            style={{ position: "absolute", top: 8, right: 12, background: "none", border: "none", color: "#DCB97866", cursor: "pointer", fontSize: "14px", fontFamily: "inherit" }}>✕</button>

          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <span style={{ fontSize: "20px" }}>{activeArtifact.icon}</span>
            <div>
              <div style={{ fontSize: "14px", color: activeArtifact.color, fontWeight: 600, fontFamily: "'Crimson Pro', serif" }}>{activeArtifact.label}</div>
            </div>
          </div>

          <div style={{ fontSize: "12px", lineHeight: 1.8, color: "#FFEBD2aa", marginBottom: 12, fontFamily: "'Crimson Pro', serif" }}>
            {activeArtifact.desc}
          </div>

          <div style={{ background: "#FFC36406", border: "1px solid #FFC36412", borderRadius: 8, padding: "10px 14px" }}>
            <div style={{ fontSize: "8px", color: "#DCB97866", letterSpacing: 2, marginBottom: 6 }}>FROM THE CONVERSATIONS</div>
            <div style={{ fontSize: "11px", lineHeight: 1.8, color: "#FFC364aa", whiteSpace: "pre-wrap", fontFamily: "'Crimson Pro', serif", fontStyle: "italic" }}>
              {activeArtifact.quote}
            </div>
          </div>
        </div>
      )}

      {/* Zone description when entering */}
      {currentZone && !activeArtifact && (
        <div style={{
          position: "absolute", top: 50, left: "50%", transform: "translateX(-50%)",
          padding: "6px 16px", borderRadius: 6,
          background: "#0c0a08cc", border: `1px solid ${currentZone.color}22`,
          fontSize: "10px", color: currentZone.color + '88',
          fontFamily: "'Crimson Pro', serif", fontStyle: "italic",
          maxWidth: 400, textAlign: "center",
        }}>
          {currentZone.desc}
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════════
// MAIN APP — View Toggle Wrapper
// ═══════════════════════════════════════════════════════

function KaleidoscopeApp() {
  const [viewMode, setViewMode] = useState("graph"); // "graph" | "world"
  const [soundOn, setSoundOn] = useState(false);
  useAmbientSound(soundOn);

  const toggleStyle = {
    position: "fixed", top: 10, left: "50%", transform: "translateX(-50%)", zIndex: 9999,
    display: "flex", gap: 0, borderRadius: 8, overflow: "hidden",
    border: "1px solid #FFC36433", background: "#0c0a08dd", backdropFilter: "blur(8px)",
    boxShadow: "0 4px 20px rgba(0,0,0,0.4)",
  };

  const tabStyle = (active) => ({
    padding: "7px 14px", fontSize: "9px", letterSpacing: 2, cursor: "pointer",
    background: active ? "#FFC36418" : "transparent",
    color: active ? "#FFC364" : "#FFC36455",
    border: "none", fontFamily: "'JetBrains Mono', monospace",
    borderRight: "1px solid #FFC36418",
    transition: "all 0.2s",
  });

  return (
    <div style={{ width: "100vw", height: "100vh", overflow: "hidden", position: "relative" }}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />

      {viewMode === "graph" ? (
        <GraphView soundOn={soundOn} setSoundOn={setSoundOn} />
      ) : (
        <WorldView />
      )}

      {/* View Toggle — always visible, top center */}
      <div style={toggleStyle}>
        <button style={tabStyle(viewMode === "graph")} onClick={() => setViewMode("graph")}>
          ◎ GRAPH
        </button>
        <button style={tabStyle(viewMode === "world")} onClick={() => setViewMode("world")}>
          ⊞ WORLD
        </button>
        <button style={{ ...tabStyle(soundOn), borderRight: "none", fontSize: "12px", padding: "5px 10px" }}
          onClick={() => setSoundOn(!soundOn)} title={soundOn ? "Mute" : "Ambient sound"}>
          {soundOn ? "🔊" : "🔇"}
        </button>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(KaleidoscopeApp));

  </script>
</body>
</html>
